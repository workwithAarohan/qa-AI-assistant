<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TestApp — Dashboard</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f5f5f5}
    nav{background:white;border-bottom:1px solid #e5e5e5;padding:0 2rem;display:flex;align-items:center;gap:2rem;height:52px}
    .nav-logo{font-weight:600;color:#4f46e5;font-size:15px}
    .nav-link{font-size:13px;color:#555;text-decoration:none;padding:4px 0}
    .nav-link.active{color:#4f46e5;font-weight:500;border-bottom:2px solid #4f46e5}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
    .avatar{width:28px;height:28px;border-radius:50%;background:#4f46e5;color:white;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center}
    .logout{font-size:12px;color:#888;text-decoration:none}
    main{padding:2rem;max-width:960px;margin:0 auto}
    h1{font-size:20px;font-weight:600;margin-bottom:.25rem}
    .sub{font-size:13px;color:#888;margin-bottom:2rem}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:2rem}
    .stat{background:white;border:1px solid #e5e5e5;border-radius:10px;padding:1.25rem}
    .stat-n{font-size:28px;font-weight:600}
    .stat-l{font-size:12px;color:#888;margin-top:2px}
    .actions{display:flex;gap:10px}
    .btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-block}
    .btn-primary{background:#4f46e5;color:white;border:none}
    .btn-primary:hover{background:#4338ca}
    .btn-secondary{background:white;color:#333;border:1px solid #ddd}
    .btn-secondary:hover{background:#f5f5f5}
    #welcome-msg{font-size:13px;color:#4f46e5;margin-bottom:1rem}
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">TestApp</div>
    <a href="/dashboard" class="nav-link active" id="nav-dashboard">Dashboard</a>
    <a href="/projects" class="nav-link" id="nav-projects">Projects</a>
    <a href="/profile" class="nav-link" id="nav-profile">Profile</a>
    <div class="nav-right">
      <div class="avatar">A</div>
      <a href="/dashboard" class="logout" id="logout-link">Logout</a>
    </div>
  </nav>
  <main>
    <div id="welcome-msg">Welcome back, admin</div>
    <h1 id="page-title">Dashboard</h1>
    <p class="sub">Here is what is happening today.</p>
    <div class="stats">
      <div class="stat" id="stat-projects"><div class="stat-n" id="project-count">3</div><div class="stat-l">Active projects</div></div>
      <div class="stat" id="stat-tests"><div class="stat-n">12</div><div class="stat-l">Tests run today</div></div>
      <div class="stat" id="stat-pass"><div class="stat-n">98%</div><div class="stat-l">Pass rate</div></div>
    </div>
    <div class="actions">
      <a href="/projects" class="btn btn-secondary" id="view-projects-btn">View projects</a>
    </div>
  </main>
</body>
</html>
