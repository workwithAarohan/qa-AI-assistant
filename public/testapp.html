<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TestApp — Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{background:white;border-radius:12px;padding:2rem;width:360px;border:1px solid #e5e5e5}
    .logo{font-size:18px;font-weight:600;color:#111;margin-bottom:1.5rem}.logo span{color:#4f46e5}
    label{display:block;font-size:13px;color:#555;margin-bottom:4px}
    input{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;margin-bottom:1rem}
    input:focus{border-color:#4f46e5}
    button{width:100%;padding:10px;background:#4f46e5;color:white;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
    button:hover{background:#4338ca}
    #error{display:none;color:#dc2626;font-size:13px;margin-top:10px;padding:8px 12px;background:#fef2f2;border-radius:6px;border:1px solid #fecaca}
    .hint{margin-top:1rem;font-size:12px;color:#aaa;text-align:center}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span>Test</span>App</div>
    <label for="username">Username</label>
    <input id="username" type="text" placeholder="Enter username" autocomplete="off"/>
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Enter password"/>
    <button id="login-btn" onclick="login()">Sign in</button>
    <div id="error">Invalid username or password</div>
    <div class="hint">Use admin / admin to sign in</div>
  </div>
  <script>
    function login() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      document.getElementById('error').style.display = 'none';
      if (u === 'admin' && p === 'admin') {
        window.location.href = '/dashboard';
      } else {
        document.getElementById('error').style.display = 'block';
      }
    }
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
