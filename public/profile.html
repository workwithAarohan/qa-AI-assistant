<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TestApp — Profile</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f5f5f5}
    nav{background:white;border-bottom:1px solid #e5e5e5;padding:0 2rem;display:flex;align-items:center;gap:2rem;height:52px}
    .nav-logo{font-weight:600;color:#4f46e5;font-size:15px}
    .nav-link{font-size:13px;color:#555;text-decoration:none;padding:4px 0}
    .nav-link.active{color:#4f46e5;font-weight:500;border-bottom:2px solid #4f46e5}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
    .avatar{width:28px;height:28px;border-radius:50%;background:#4f46e5;color:white;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center}
    .logout{font-size:12px;color:#888;text-decoration:none}
    main{padding:2rem;max-width:600px;margin:0 auto}
    h1{font-size:20px;font-weight:600;margin-bottom:1.5rem}
    .profile-card{background:white;border:1px solid #e5e5e5;border-radius:12px;padding:1.5rem}
    .profile-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
    .profile-avatar{width:52px;height:52px;border-radius:50%;background:#4f46e5;color:white;font-size:18px;font-weight:600;display:flex;align-items:center;justify-content:center}
    .profile-name{font-size:16px;font-weight:600}
    .profile-role{font-size:12px;color:#888}
    label{display:block;font-size:12px;color:#666;margin-bottom:4px}
    input{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;margin-bottom:12px}
    input:focus{border-color:#4f46e5}
    .btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:#4f46e5;color:white}
    .btn:hover{background:#4338ca}
    #save-msg{display:none;font-size:13px;color:#16a34a;margin-top:8px}
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">TestApp</div>
    <a href="/dashboard" class="nav-link active" id="nav-dashboard">Dashboard</a>
    <a href="/projects" class="nav-link" id="nav-projects">Projects</a>
    <a href="/profile" class="nav-link" id="nav-profile">Profile</a>
    <div class="nav-right">
      <div class="avatar">A</div>
      <a href="/testapp" class="logout" id="logout-link">Logout</a>
    </div>
  </nav>
  <main>
    <h1 id="profile-heading">Profile</h1>
    <div class="profile-card">
      <div class="profile-row">
        <div class="profile-avatar">A</div>
        <div><div class="profile-name" id="profile-name">Admin User</div><div class="profile-role">Administrator</div></div>
      </div>
      <label for="profile-email">Email</label>
      <input id="profile-email" type="email" value="admin@testapp.com"/>
      <label for="profile-username">Username</label>
      <input id="profile-username" type="text" value="admin"/>
      <button class="btn" id="save-profile-btn" onclick="save()">Save changes</button>
      <div id="save-msg">Changes saved</div>
    </div>
  </main>
  <script>
    function save() {
      document.getElementById('save-msg').style.display = 'block';
      setTimeout(() => document.getElementById('save-msg').style.display = 'none', 2000);
    }
  </script>
</body>
</html>
