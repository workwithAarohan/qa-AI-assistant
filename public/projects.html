<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TestApp — Projects</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f5f5f5}
    nav{background:white;border-bottom:1px solid #e5e5e5;padding:0 2rem;display:flex;align-items:center;gap:2rem;height:52px}
    .nav-logo{font-weight:600;color:#4f46e5;font-size:15px}
    .nav-link{font-size:13px;color:#555;text-decoration:none;padding:4px 0}
    .nav-link.active{color:#4f46e5;font-weight:500;border-bottom:2px solid #4f46e5}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
    .avatar{width:28px;height:28px;border-radius:50%;background:#4f46e5;color:white;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center}
    .logout{font-size:12px;color:#888;text-decoration:none}
    main{padding:2rem;max-width:960px;margin:0 auto}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
    h1{font-size:20px;font-weight:600}
    .btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none}
    .btn-primary{background:#4f46e5;color:white}
    .btn-primary:hover{background:#4338ca}
    .btn-sm{padding:5px 12px;font-size:12px;background:white;border:1px solid #ddd;border-radius:6px;cursor:pointer;color:#555}
    .project-list{display:flex;flex-direction:column;gap:10px;margin-bottom:2rem}
    .project-card{background:white;border:1px solid #e5e5e5;border-radius:10px;padding:1rem 1.25rem;display:flex;align-items:center;gap:12px}
    .project-dot{width:8px;height:8px;border-radius:50%;background:#4f46e5;flex-shrink:0}
    .project-name{font-size:14px;font-weight:500;flex:1}
    .project-tag{font-size:11px;color:#888}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);align-items:center;justify-content:center;z-index:10}
    .modal-overlay.visible{display:flex}
    .modal{background:white;border-radius:12px;padding:1.5rem;width:420px;border:1px solid #e5e5e5}
    .modal h2{font-size:16px;font-weight:600;margin-bottom:1.25rem}
    label{display:block;font-size:12px;color:#666;margin-bottom:4px}
    input,select{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;margin-bottom:12px}
    input:focus,select:focus{border-color:#4f46e5}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end}
    .btn-cancel{padding:8px 14px;background:white;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;color:#555}
    #success-msg{display:none;font-size:13px;color:#16a34a;padding:8px 12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;margin-bottom:12px}
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">TestApp</div>
    <a href="/testapp/dashboard.html" class="nav-link">Dashboard</a>
    <a href="/testapp/projects.html" class="nav-link active">Projects</a>
    <a href="/testapp/profile.html" class="nav-link">Profile</a>
    <div class="nav-right">
      <div class="avatar">A</div>
      <a href="/testapp/index.html" class="logout" id="logout-link">Logout</a>
    </div>
  </nav>
  <main>
    <div class="page-header">
      <h1 id="projects-heading">Projects</h1>
      <button class="btn btn-primary" id="new-project-btn" onclick="openModal()">New project</button>
    </div>
    <div id="success-msg">Project created successfully</div>
    <div class="project-list" id="project-list">
      <div class="project-card"><div class="project-dot"></div><div class="project-name" id="project-alpha">Alpha</div><div class="project-tag">Web</div><button class="btn-sm">View</button></div>
      <div class="project-card"><div class="project-dot"></div><div class="project-name" id="project-beta">Beta</div><div class="project-tag">Mobile</div><button class="btn-sm">View</button></div>
      <div class="project-card"><div class="project-dot"></div><div class="project-name" id="project-gamma">Gamma</div><div class="project-tag">API</div><button class="btn-sm">View</button></div>
    </div>
  </main>
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>Create new project</h2>
      <label for="project-name-input">Project name</label>
      <input id="project-name-input" type="text" placeholder="e.g. Delta"/>
      <label for="project-type-select">Type</label>
      <select id="project-type-select">
        <option value="web">Web</option>
        <option value="mobile">Mobile</option>
        <option value="api">API</option>
      </select>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancel-btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="create-project-btn" onclick="createProject()">Create</button>
      </div>
    </div>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('new') === '1') openModal();
    function openModal() { document.getElementById('modalOverlay').classList.add('visible'); }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('visible'); document.getElementById('project-name-input').value = ''; }
    function createProject() {
      const name = document.getElementById('project-name-input').value.trim();
      if (!name) return;
      const type = document.getElementById('project-type-select').value;
      const list = document.getElementById('project-list');
      const card = document.createElement('div');
      card.className = 'project-card';
      card.id = 'project-' + name.toLowerCase();
      card.innerHTML = `<div class="project-dot"></div><div class="project-name">${name}</div><div class="project-tag">${type.charAt(0).toUpperCase()+type.slice(1)}</div><button class="btn-sm">View</button>`;
      list.appendChild(card);
      closeModal();
      const msg = document.getElementById('success-msg');
      msg.textContent = `Project "${name}" created successfully`;
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 3000);
    }
  </script>
</body>
</html>
