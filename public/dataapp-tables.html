<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>DataApp — Tables</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8FAFC;--surface:#fff;--border:#E2E8F0;--t1:#0F172A;--t2:#475569;--t3:#94A3B8;
  --accent:#059669;--accent-dim:rgba(5,150,105,0.08);--red:#DC2626;--amber:#D97706;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--t1);font-size:13px;min-height:100vh}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;gap:24px}
.nav-brand{font-size:15px;font-weight:700;color:var(--accent)}
.nav-link{font-size:13px;color:var(--t2);text-decoration:none;padding:4px 0;border-bottom:2px solid transparent}
.nav-link.active{color:var(--accent);border-bottom-color:var(--accent)}
main{padding:28px 32px;max-width:1200px}
h1{font-size:20px;font-weight:700;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--t3);margin-bottom:24px}

/* Controls bar */
.controls{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:360px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3)}
#filter-input{width:100%;padding:7px 10px 7px 34px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--t1);background:var(--surface);outline:none}
#filter-input:focus{border-color:var(--accent)}
.dept-wrap select{padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--t1);background:var(--surface);outline:none;cursor:pointer}
.dept-wrap select:focus{border-color:var(--accent)}
#row-count{font-size:12px;color:var(--t3);margin-left:auto;white-space:nowrap}
#export-btn{padding:7px 16px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
#export-btn:hover{background:#047857}

/* Table */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:#F1F5F9}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
th:hover{color:var(--t2)}
th.sorted-asc::after{content:' ↑';color:var(--accent)}
th.sorted-desc::after{content:' ↓';color:var(--accent)}
th[data-sort]{position:relative}
td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--t1);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background 0.1s}
tbody tr:hover{background:#F8FAFC}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.badge.active{background:rgba(5,150,105,0.1);color:var(--accent)}
.badge.inactive{background:rgba(148,163,184,0.15);color:var(--t3)}
.badge.engineering{background:rgba(99,102,241,0.1);color:#4F46E5}
.badge.qa{background:rgba(245,158,11,0.1);color:var(--amber)}
.badge.product{background:rgba(14,165,233,0.1);color:#0284C7}
.badge.design{background:rgba(236,72,153,0.1);color:#DB2777}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);background:var(--surface)}
.page-btns{display:flex;gap:4px}
.page-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-size:12px;cursor:pointer;color:var(--t2);transition:all 0.1s}
.page-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.page-btn:disabled{opacity:0.35;cursor:not-allowed}
#page-info{font-size:12px;color:var(--t3)}

/* States */
#table-loading{text-align:center;padding:48px;color:var(--t3);display:none}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
#table-error{display:none;padding:14px 16px;background:rgba(220,38,38,0.06);border:1px solid rgba(220,38,38,0.2);border-radius:8px;color:var(--red);font-size:12px;margin-bottom:16px}
.empty{text-align:center;padding:48px;color:var(--t3)}
</style>
</head>
<body>
<nav>
  <span class="nav-brand">DataApp</span>
  <a href="/dataapp/tables" class="nav-link active" id="nav-tables">Tables</a>
  <a href="/dataapp/validation" class="nav-link" id="nav-validation">Validation</a>
</nav>
<main>
  <h1 id="page-heading">Employee Directory</h1>
  <p class="subtitle">Backend-driven table — filter, sort, and paginate across the full dataset</p>

  <div id="table-error"></div>

  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M9.5 9.5L12 12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      <input id="filter-input" type="text" placeholder="Search name, email, department…" autocomplete="off"/>
    </div>
    <div class="dept-wrap">
      <select id="dept-filter">
        <option value="">All departments</option>
        <option value="Engineering">Engineering</option>
        <option value="QA">QA</option>
        <option value="Product">Product</option>
        <option value="Design">Design</option>
      </select>
    </div>
    <span id="row-count">Loading…</span>
    <button id="export-btn" onclick="exportCSV()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v7M3 5l3 3 3-3M1 10h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Export CSV
    </button>
  </div>

  <div class="table-wrap">
    <div id="table-loading"><span class="spinner"></span>Loading data…</div>
    <table id="data-table" style="display:none">
      <thead>
        <tr>
          <th data-sort="id" data-col="id">ID</th>
          <th data-sort="name" data-col="name">Name</th>
          <th data-sort="email" data-col="email">Email</th>
          <th data-sort="department" data-col="department">Department</th>
          <th data-sort="role" data-col="role">Role</th>
          <th data-sort="salary" data-col="salary">Salary</th>
          <th data-sort="start_date" data-col="start_date">Start Date</th>
          <th data-sort="status" data-col="status">Status</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="pagination" id="pagination" style="display:none">
      <span id="page-info">Page 1 of 1</span>
      <div class="page-btns">
        <button class="page-btn" id="page-prev" onclick="changePage(-1)" disabled>← Prev</button>
        <button class="page-btn" id="page-next" onclick="changePage(1)">Next →</button>
      </div>
    </div>
  </div>
</main>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let allData = [];
let filteredData = [];
let currentPage = 1;
const PER_PAGE = 10;
let sortCol = 'id', sortDir = 'asc';
let filterText = '', filterDept = '';
let filterTimer = null;

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('table-loading').style.display = 'block';
  document.getElementById('data-table').style.display = 'none';
  document.getElementById('pagination').style.display = 'none';

  try {
    const res = await fetch('/api/dataapp/employees');
    if (!res.ok) throw new Error(`API error ${res.status}: ${res.statusText}`);
    allData = await res.json();
    applyFilters();
    document.getElementById('table-error').style.display = 'none';
  } catch (e) {
    document.getElementById('table-error').textContent = `Failed to load data: ${e.message}`;
    document.getElementById('table-error').style.display = 'block';
  } finally {
    document.getElementById('table-loading').style.display = 'none';
  }
}

// ── Filter + Sort + Paginate ─────────────────────────────────────────────────
function applyFilters() {
  const q = filterText.toLowerCase();
  filteredData = allData.filter(r => {
    const textMatch = !q || [r.name, r.email, r.department, r.role].some(v => v?.toLowerCase().includes(q));
    const deptMatch = !filterDept || r.department === filterDept;
    return textMatch && deptMatch;
  });
  sortData();
  currentPage = 1;
  renderPage();
}

function sortData() {
  filteredData.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'salary') { va = Number(va); vb = Number(vb); }
    else { va = String(va ?? '').toLowerCase(); vb = String(vb ?? '').toLowerCase(); }
    if (va < vb) return sortDir === 'asc' ? -1 :  1;
    if (va > vb) return sortDir === 'asc' ?  1 : -1;
    return 0;
  });
}

function renderPage() {
  const total = filteredData.length;
  const pages = Math.max(1, Math.ceil(total / PER_PAGE));
  const start = (currentPage - 1) * PER_PAGE;
  const pageRows = filteredData.slice(start, start + PER_PAGE);

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = pageRows.length === 0
    ? `<tr><td colspan="8" class="empty">No results match your filters</td></tr>`
    : pageRows.map(r => `
      <tr data-id="${r.id}">
        <td data-col="id">${r.id}</td>
        <td data-col="name" style="font-weight:500">${esc(r.name)}</td>
        <td data-col="email" style="color:var(--t2)">${esc(r.email)}</td>
        <td data-col="department"><span class="badge ${r.department?.toLowerCase()}">${esc(r.department)}</span></td>
        <td data-col="role" style="color:var(--t2)">${esc(r.role)}</td>
        <td data-col="salary">$${Number(r.salary).toLocaleString()}</td>
        <td data-col="start_date">${formatDate(r.start_date)}</td>
        <td data-col="status"><span class="badge ${r.status?.toLowerCase()}">${esc(r.status)}</span></td>
      </tr>`).join('');

  document.getElementById('row-count').textContent = `${total.toLocaleString()} employee${total !== 1 ? 's' : ''}`;
  document.getElementById('page-info').textContent  = `Page ${currentPage} of ${pages}`;
  document.getElementById('page-prev').disabled = currentPage <= 1;
  document.getElementById('page-next').disabled = currentPage >= pages;

  document.getElementById('data-table').style.display  = 'table';
  document.getElementById('pagination').style.display  = 'flex';

  // Update sort indicators
  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.classList.remove('sorted-asc', 'sorted-desc');
    if (th.dataset.sort === sortCol) th.classList.add(`sorted-${sortDir}`);
  });
}

function changePage(delta) {
  const pages = Math.max(1, Math.ceil(filteredData.length / PER_PAGE));
  currentPage = Math.max(1, Math.min(pages, currentPage + delta));
  renderPage();
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('filter-input').addEventListener('input', e => {
  clearTimeout(filterTimer);
  filterText = e.target.value;
  filterTimer = setTimeout(applyFilters, 300); // debounce
});

document.getElementById('dept-filter').addEventListener('change', e => {
  filterDept = e.target.value;
  applyFilters();
});

document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.sort;
    if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortCol = col; sortDir = 'asc'; }
    sortData();
    renderPage();
  });
});

// ── Export ────────────────────────────────────────────────────────────────────
function exportCSV() {
  const headers = ['id','name','email','department','role','salary','start_date','status'];
  const rows    = [headers.join(','), ...filteredData.map(r => headers.map(h => `"${(r[h]??'').toString().replace(/"/g,'""')}"`).join(','))];
  const blob    = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url     = URL.createObjectURL(blob);
  const a       = document.createElement('a');
  a.href = url; a.download = 'employees.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ── Utils ────────────────────────────────────────────────────────────────────
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }); }
  catch { return d; }
}

// ── Init ─────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
